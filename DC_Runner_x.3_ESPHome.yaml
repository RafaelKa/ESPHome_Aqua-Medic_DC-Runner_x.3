esphome:
  name: dc-runner-3-3
  friendly_name: "DC Runner 3.3"
  min_version: 2024.1.0
  on_boot:
    priority: 600
    then:
      - uart.write: [0xF5, 0x0A, 0x04, 0x03, 0x00, 0x07]

esp8266:
  board: esp12e
  restore_from_flash: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  reboot_timeout: 0s
ota:
  platform: esphome
web_server:
  port: 80

logger:
  level: DEBUG
  baud_rate: 0

uart:
  id: mcu_uart
  tx_pin: GPIO1
  rx_pin: GPIO3
  baud_rate: 9600

globals:
  - id: ignore_mcu_updates_until
    type: uint32_t
    initial_value: '0'
  - id: mcu_synced
    type: bool
    initial_value: 'false'

# Der Hardware-Pin für das Icon
output:
  # Wi-Fi icon on DC Runner x.3 display
  - platform: gpio
    pin: GPIO12
    id: wifi_icon_pin
    inverted: true

number:
  - platform: template
    name: "Flow rate"
    id: pump_speed
    min_value: 30
    max_value: 100
    step: 1
    unit_of_measurement: "%"
    optimistic: true
    on_value:
      then:
        - lambda: |-
            if (id(mcu_synced) && millis() > id(ignore_mcu_updates_until)) {
              id(ignore_mcu_updates_until) = millis() + 1000;
              id(send_command).execute();
            }

  - platform: template
    name: "Feed timer"
    id: feed_timer
    min_value: 10
    max_value: 60
    step: 1
    unit_of_measurement: "min"
    optimistic: true
    on_value:
      then:
        - lambda: |-
            if (id(mcu_synced) && millis() > id(ignore_mcu_updates_until)) {
              id(ignore_mcu_updates_until) = millis() + 1000;
              id(send_command).execute();
            }

switch:
  - platform: template
    name: "Power switch"
    id: pump_power_sw
    optimistic: true
    on_turn_on:
      then:
        - lambda: "if(id(mcu_synced) && millis() > id(ignore_mcu_updates_until)){ id(ignore_mcu_updates_until) = millis() + 1000; id(send_command).execute(); }"
    on_turn_off:
      then:
        - lambda: "if(id(mcu_synced) && millis() > id(ignore_mcu_updates_until)){ id(ignore_mcu_updates_until) = millis() + 1000; id(send_command).execute(); }"

  - platform: template
    name: "Feed switch"
    id: pump_feed_sw
    optimistic: true
    on_turn_on:
      then:
        - lambda: "if(id(mcu_synced) && millis() > id(ignore_mcu_updates_until)){ id(ignore_mcu_updates_until) = millis() + 1000; id(send_command).execute(); }"
    on_turn_off:
      then:
        - lambda: "if(id(mcu_synced) && millis() > id(ignore_mcu_updates_until)){ id(ignore_mcu_updates_until) = millis() + 1000; id(send_command).execute(); }"

script:
  - id: send_command
    mode: restart
    then:
      - lambda: |-
          uint8_t wifi_val = network::is_connected() ? 0x02 : 0x01;
          uint8_t p[] = {0xF5, 0x0A, 0x0B, 0x02, 0x00, 0x00, 0x00, 0x00, 0x00, wifi_val, 0x47, 0x00, 0x00};
          p[4] = id(pump_power_sw).state ? 0x01 : 0x00;
          p[5] = id(pump_feed_sw).state ? 0x01 : 0x00;
          p[6] = (uint8_t)id(pump_speed).state;
          p[7] = (uint8_t)id(feed_timer).state;

          uint16_t sum = 0;
          for (int i = 2; i <= 11; i++) sum += p[i];
          p[12] = (uint8_t)(sum & 0xFF);

          id(mcu_uart).write_array(p, 13);

interval:
  # set Wi-Fi icon on display regarding connection status of ESP8266.
  - interval: 1s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - output.turn_on: wifi_icon_pin
          else:
            - output.turn_off: wifi_icon_pin

  - interval: 2s
    then:
      - lambda: |-
          uint8_t wifi_status = network::is_connected() ? 0x02 : 0x01;
          uint8_t hb_cs = (uint8_t)(0x05 + wifi_status);
          uint8_t hb[] = {0xF5, 0x0A, 0x04, 0x01, wifi_status, hb_cs};
          id(mcu_uart).write_array(hb, 6);

  - interval: 20ms
    then:
      - lambda: |-
          while (id(mcu_uart).available() >= 14) {
            uint8_t header_byte;
            id(mcu_uart).peek_byte(&header_byte);
            if (header_byte != 0xF5) {
              id(mcu_uart).read_byte(&header_byte);
              continue;
            }

            uint8_t data[14];
            id(mcu_uart).read_array(data, 14);

            if (data[1] == 0x0A && data[2] == 0x0C && data[3] == 0x01) {
              if (millis() > id(ignore_mcu_updates_until)) {
                bool changed = false;

                if (id(pump_power_sw).state != (data[4] == 0x01)) {
                  id(pump_power_sw).publish_state(data[4] == 0x01);
                  changed = true;
                }
                if (id(pump_feed_sw).state != (data[5] == 0x01)) {
                  id(pump_feed_sw).publish_state(data[5] == 0x01);
                  changed = true;
                }
                if ((uint8_t)id(pump_speed).state != data[6]) {
                  id(pump_speed).publish_state((float)data[6]);
                  changed = true;
                }
                if ((uint8_t)id(feed_timer).state != data[7]) {
                  id(feed_timer).publish_state((float)data[7]);
                  changed = true;
                }

                if (changed || !id(mcu_synced)) {
                  id(mcu_synced) = true;
                  ESP_LOGD("custom", "Status synchronisiert.");
                }
              }
            }
          }
